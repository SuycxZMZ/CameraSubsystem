        <line x1="565" y1="374" x2="565" y2="406" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow)"/>
        <line x1="665" y1="429" x2="833" y2="299" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow)"/>
