        <text x="52" y="92" fill="#34d399" font-size="10" font-weight="600">CameraSubsystem Core</text>
        <rect x="85" y="125" width="190" height="65" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="180" y="152" fill="white" font-size="12" font-weight="600" text-anchor="middle">CameraSource</text>
        <text x="180" y="170" fill="#94a3b8" font-size="9" text-anchor="middle">USB / UVC / MIPI / others</text>
        <rect x="85" y="250" width="190" height="65" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
